<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log — Misophonia Protocol V9.3</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf8f4;--white:#fff;--border:#e4e0d8;--border-light:#f4f0e8;--text:#2a2824;--text-mid:#4a4540;--text-muted:#8a7f70;--green-dark:#2d4a28;--green-mid:#4a7a42;--green-light:#e8f0e5;--green-border:#b8d4b0;--amber:#b87a1a;--amber-light:#fdf3e0;--rose:#a83050;--rose-light:#fdf0f3;--topbar-h:54px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.65;font-size:14px}
h1,h2,h3{font-family:'Lora',Georgia,serif;font-weight:500}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* TOPBAR */
#topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--topbar-h);background:var(--green-dark);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:2px solid #1a3018}
#topbar .logo{font-family:'Lora',serif;font-size:14.5px;font-weight:600;color:#e8f4e4;white-space:nowrap;flex-shrink:0}
#topbar .vbadge{font-size:9.5px;font-weight:600;background:rgba(255,255,255,.12);color:#a8d4a0;border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 6px;letter-spacing:.05em;flex-shrink:0}
.sat-links{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.sat-link{font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:500;padding:4px 11px;border-radius:20px;text-decoration:none;color:#c8e8c0;border:1px solid rgba(255,255,255,.18);transition:all .15s;white-space:nowrap}
.sat-link:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.sat-link.active{background:rgba(255,255,255,.18);color:#fff}
/* ── MOBILE TOPBAR ── */

#topbar .logo{font-size:12.5px}
  #topbar .vbadge{display:none}
}


/* PAGE */
.page{margin-top:var(--topbar-h);padding:28px 24px 80px;max-width:780px;margin-left:auto;margin-right:auto}

/* INPUT ROW */
.input-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
#entry-input{flex:1;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:9px;padding:9px 14px;line-height:1.5;resize:none;height:40px;overflow:hidden;outline:none;transition:border-color .15s}
#entry-input:focus{border-color:var(--green-mid)}
#entry-input::placeholder{color:var(--text-muted)}
.btn-save{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;padding:7px 16px;border-radius:8px;border:1px solid var(--green-border);background:var(--green-light);color:var(--green-dark);cursor:pointer;transition:all .15s;white-space:nowrap;flex-shrink:0}
.btn-save:hover{background:var(--green-dark);color:#fff;border-color:var(--green-dark)}
.btn-save:disabled{opacity:.4;cursor:not-allowed}

/* STATUS */
.status{font-size:11.5px;height:18px;color:var(--text-muted);margin-bottom:18px}
.status.ok{color:var(--green-mid)}
.status.err{color:var(--rose)}

/* ENTRIES HEADER */
.entries-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.entries-label{font-size:10px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text-muted)}
.entries-count{font-size:11px;color:var(--text-muted);background:var(--border-light);padding:2px 8px;border-radius:10px}

/* SEARCH */
.search-bar{position:relative;margin-bottom:14px}
.search-bar input{width:100%;padding:8px 14px 8px 34px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--white);border:1px solid var(--border);border-radius:8px;outline:none;transition:border-color .15s}
.search-bar input:focus{border-color:var(--green-mid)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-muted);font-size:13px;pointer-events:none}

/* ENTRY */
.entry{background:var(--white);border:1px solid var(--border);border-radius:11px;padding:14px 16px;margin-bottom:8px;position:relative}
.entry.editing{border-color:var(--green-mid)}
.entry-meta{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.entry-date{font-family:'DM Mono',monospace;font-size:10.5px;color:var(--green-mid);font-weight:500}
.entry-edited{font-size:10px;color:var(--text-muted);font-style:italic}
.entry-text{font-size:13.5px;color:var(--text-mid);line-height:1.7;white-space:pre-wrap;word-break:break-word;padding-right:52px}
.entry-actions{position:absolute;top:10px;right:12px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.entry:hover .entry-actions,.entry.editing .entry-actions{opacity:1}
.act-btn{background:none;border:none;cursor:pointer;padding:4px 7px;border-radius:5px;font-size:13px;color:var(--text-muted);transition:all .15s;line-height:1}
.act-btn:hover{background:var(--border-light);color:var(--text)}
.act-btn.del:hover{background:var(--rose-light);color:var(--rose)}
.act-btn.confirm:hover{background:var(--green-light);color:var(--green-dark)}

/* EDIT TEXTAREA */
.edit-area{width:100%;font-family:'DM Sans',sans-serif;font-size:13.5px;color:var(--text-mid);background:var(--cream);border:1px solid var(--green-border);border-radius:7px;padding:8px 10px;line-height:1.7;resize:vertical;outline:none;min-height:72px}
.edit-area:focus{border-color:var(--green-mid)}

/* EMPTY / LOADING */
.empty{text-align:center;padding:44px 20px;color:var(--text-muted)}
.empty-icon{font-size:28px;margin-bottom:10px;opacity:.35}
.empty p{font-size:13px}
.loading{text-align:center;padding:28px;color:var(--text-muted);font-size:13px}

@media(max-width:600px){
  .page{padding:18px 14px 60px}
  .sat-link{font-size:9.5px;padding:3px 8px}
}

#hamburger{display:none;background:none;border:none;color:#a8d4a0;font-size:22px;cursor:pointer;padding:4px 8px;margin-left:auto;flex-shrink:0;line-height:1}
#nav-drawer{display:none;position:fixed;top:var(--topbar-h);left:0;right:0;z-index:299;background:var(--green-dark);border-bottom:2px solid #1a3018;padding:10px 16px 14px;flex-direction:column;gap:6px}
#nav-drawer.open{display:flex}
#nav-drawer a{color:#c8e8c0;border:1px solid rgba(255,255,255,.18);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:11px 16px;border-radius:8px;text-decoration:none;text-align:center;transition:background .12s}
#nav-drawer a:hover,#nav-drawer a.active{background:rgba(255,255,255,.18);color:#fff}

/* ── MOBILE ── */
@media(max-width:700px){
  .sat-links{display:none}
  #hamburger{display:block}
  #topbar .logo{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100vw - 88px)}
  #topbar .vbadge{display:none}
  #topbar{gap:8px;padding:0 14px}
}
@media(max-width:430px){
  #topbar .logo{font-size:12px;max-width:calc(100vw - 80px)}
  #topbar{padding:0 10px;gap:6px}
  #hamburger{font-size:20px;padding:2px 6px}
}
</style>
</head>
<body>

<header id="topbar">
  <a href="protocol.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0">
    <span class="logo">The Misophonia Rewiring &amp; Wellness Protocol</span>
    <span class="vbadge">V9.3</span>
  </a>
  <nav class="sat-links">
    <a href="cheatsheet.html" class="sat-link">Cheat Sheet</a>
    <a href="glossary.html" class="sat-link">Glossary</a>
    <a href="exercises.html" class="sat-link">Exercises</a>
    <a href="diet.html" class="sat-link">Diet</a>
    <a href="shopping.html" class="sat-link">Shopping</a>
    <a href="log.html" class="sat-link active">Log</a>
  </nav>
  <button id="hamburger">&#9776;</button>
</header>
<div id="nav-drawer">
  <a href="protocol.html">Protocol</a>
  <a href="cheatsheet.html">Cheat Sheet</a>
  <a href="glossary.html">Glossary</a>
  <a href="exercises.html">Exercises</a>
  <a href="diet.html">Diet</a>
  <a href="shopping.html">Shopping</a>
</div>


<div class="page">

  <div class="input-row">
    <textarea id="entry-input" placeholder="Note something…" rows="1"></textarea>
    <button class="btn-save" id="submit-btn" onclick="saveEntry()">Save</button>
  </div>
  <div class="status" id="status"></div>

  <div class="entries-head">
    <span class="entries-label">Entries</span>
    <span class="entries-count" id="entries-count">—</span>
  </div>

  <div class="search-bar">
    <span class="search-icon">&#9906;</span>
    <input type="text" id="search-input" placeholder="Search…" oninput="renderEntries()">
  </div>

  <div id="entries-list"><div class="loading">Loading…</div></div>
</div>

<script>
const BIN_ID = '69d807ebaaba882197e00c09';
const API_KEY = '69d80706856a68218917c639';
const BASE = 'https://api.jsonbin.io/v3/b/' + BIN_ID;
const HEADERS = {'Content-Type':'application/json','X-Access-Key':API_KEY};

let entries = [];
let editingId = null;

// ── LOAD ──────────────────────────────────────────────────────────────
async function loadEntries() {
  try {
    const r = await fetch(BASE + '/latest', {headers:{'X-Access-Key':API_KEY}});
    if (!r.ok) throw new Error();
    const data = await r.json();
    entries = Array.isArray(data.record) ? data.record : [];
    renderEntries();
  } catch(e) {
    document.getElementById('entries-list').innerHTML =
      '<div class="empty"><div class="empty-icon">&#9888;</div><p>Could not load. Check connection.</p></div>';
  }
}

// ── SAVE NEW ──────────────────────────────────────────────────────────
async function saveEntry() {
  const input = document.getElementById('entry-input');
  const text = input.value.trim();
  if (!text) return;
  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  setStatus('Saving…', '');
  const now = new Date();
  const entry = {id:now.getTime(), text, ts:now.toISOString(), display:formatDate(now)};
  const updated = [entry, ...entries];
  try {
    const r = await fetch(BASE, {method:'PUT', headers:HEADERS, body:JSON.stringify(updated)});
    if (!r.ok) throw new Error();
    entries = updated;
    input.value = '';
    renderEntries();
    setStatus('Saved.', 'ok');
    setTimeout(() => setStatus('', ''), 2500);
  } catch(e) {
    setStatus('Save failed.', 'err');
  }
  btn.disabled = false;
}

// ── DELETE ────────────────────────────────────────────────────────────
async function deleteEntry(id) {
  if (!confirm('Delete this entry?')) return;
  const updated = entries.filter(e => e.id !== id);
  try {
    const r = await fetch(BASE, {method:'PUT', headers:HEADERS, body:JSON.stringify(updated)});
    if (!r.ok) throw new Error();
    entries = updated;
    if (editingId === id) editingId = null;
    renderEntries();
  } catch(e) { alert('Delete failed.'); }
}

// ── EDIT ──────────────────────────────────────────────────────────────
function startEdit(id) {
  editingId = id;
  renderEntries();
  const ta = document.getElementById('edit-' + id);
  if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
}

async function saveEdit(id) {
  const ta = document.getElementById('edit-' + id);
  if (!ta) return;
  const text = ta.value.trim();
  if (!text) return;
  const updated = entries.map(e => e.id === id ? {...e, text, edited:true} : e);
  try {
    const r = await fetch(BASE, {method:'PUT', headers:HEADERS, body:JSON.stringify(updated)});
    if (!r.ok) throw new Error();
    entries = updated;
    editingId = null;
    renderEntries();
  } catch(e) { alert('Save failed.'); }
}

function cancelEdit() { editingId = null; renderEntries(); }

// ── RENDER ────────────────────────────────────────────────────────────
function renderEntries() {
  const query = (document.getElementById('search-input').value || '').toLowerCase();
  const filtered = query ? entries.filter(e => e.text.toLowerCase().includes(query)) : entries;

  const countEl = document.getElementById('entries-count');
  countEl.textContent = filtered.length === entries.length
    ? entries.length + ' entr' + (entries.length === 1 ? 'y' : 'ies')
    : filtered.length + ' of ' + entries.length;

  const list = document.getElementById('entries-list');
  if (filtered.length === 0) {
    list.innerHTML = entries.length === 0
      ? '<div class="empty"><div class="empty-icon">&#9998;</div><p>No entries yet.</p></div>'
      : '<div class="empty"><div class="empty-icon">&#9906;</div><p>No matches.</p></div>';
    return;
  }

  list.innerHTML = filtered.map(e => {
    const isEditing = e.id === editingId;
    const editedBadge = e.edited ? '<span class="entry-edited">edited</span>' : '';
    const body = isEditing
      ? '<textarea class="edit-area" id="edit-' + e.id + '">' + escHtml(e.text) + '</textarea>'
      : '<div class="entry-text">' + escHtml(e.text) + '</div>';
    const actions = isEditing
      ? '<div class="entry-actions"><button class="act-btn confirm" onclick="saveEdit(' + e.id + ')" title="Save changes">&#10003;</button><button class="act-btn" onclick="cancelEdit()" title="Cancel">&#10005;</button></div>'
      : '<div class="entry-actions"><button class="act-btn" onclick="startEdit(' + e.id + ')" title="Edit">&#9998;</button><button class="act-btn del" onclick="deleteEntry(' + e.id + ')" title="Delete">&#10005;</button></div>';
    return '<div class="entry' + (isEditing ? ' editing' : '') + '">'
      + '<div class="entry-meta"><span class="entry-date">' + (e.display || e.ts) + '</span>' + editedBadge + '</div>'
      + body + actions + '</div>';
  }).join('');
}

// ── HELPERS ───────────────────────────────────────────────────────────
function formatDate(d) {
  const days=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const months=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const pad = n => String(n).padStart(2,'0');
  return days[d.getDay()]+' '+d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear()+' · '+pad(d.getHours())+':'+pad(d.getMinutes());
}
function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function setStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg; el.className = 'status ' + type;
}

// ── KEYBOARD ──────────────────────────────────────────────────────────
document.getElementById('entry-input').addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'Enter') saveEntry();
  if (e.key === 'Escape') { e.target.value = ''; }
});

// Auto-expand textarea on input
document.getElementById('entry-input').addEventListener('input', function() {
  this.style.height = '40px';
  if (this.scrollHeight > 40) this.style.height = this.scrollHeight + 'px';
});

// ── INIT ──────────────────────────────────────────────────────────────
loadEntries();
</script>



<script>
(function(){
  var btn=document.getElementById('hamburger');
  var drawer=document.getElementById('nav-drawer');
  if(!btn||!drawer) return;
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    drawer.classList.toggle('open');
    btn.textContent=drawer.classList.contains('open')?'✕':'☰';
  });
  document.addEventListener('click',function(){
    drawer.classList.remove('open');
    btn.textContent='☰';
  });
  drawer.addEventListener('click',function(e){e.stopPropagation();});
})();
</script>
</body>
</html>

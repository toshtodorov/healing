<html lang="en">
<head>

<title>Protocol Cheat Sheet — V9.3</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#faf8f4;--white:#fff;--border:#e4e0d8;--border-light:#f4f0e8;--text:#2a2824;--text-mid:#4a4540;--text-muted:#8a7f70;--green-dark:#2d4a28;--green-mid:#4a7a42;--green-light:#e8f0e5;--green-border:#b8d4b0;--amber:#b87a1a;--amber-light:#fdf3e0;--amber-border:#e8c878;--rose:#a83050;--rose-light:#fdf0f3;--rose-border:#e8b0c0;--blue-dark:#2a4a6a;--blue-light:#eef4fb;--blue-border:#b8cfe8;--purple:#6a4082;--purple-light:#f5eeff;--purple-border:#c8b0f0;--topbar-h:54px}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--cream);color:var(--text);line-height:1.65;font-size:14px}
h1,h2,h3{font-family:'Lora',Georgia,serif;font-weight:500}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
#topbar{position:fixed;top:0;left:0;right:0;z-index:300;height:var(--topbar-h);background:var(--green-dark);display:flex;align-items:center;gap:10px;padding:0 18px;border-bottom:2px solid #1a3018}
#topbar .logo{font-family:'Lora',serif;font-size:14.5px;font-weight:600;color:#e8f4e4;white-space:nowrap;flex-shrink:0}
#topbar .vbadge{font-size:9.5px;font-weight:600;background:rgba(255,255,255,.12);color:#a8d4a0;border:1px solid rgba(255,255,255,.15);border-radius:4px;padding:2px 6px;letter-spacing:.05em;flex-shrink:0}
.sat-links{display:flex;gap:4px;margin-left:auto;flex-shrink:0}
.sat-link{font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:500;padding:4px 11px;border-radius:20px;text-decoration:none;color:#c8e8c0;border:1px solid rgba(255,255,255,.18);transition:all .15s;white-space:nowrap}
.sat-link:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.35)}
.sat-link.active{background:rgba(255,255,255,.18);color:#fff}
/* ── MOBILE TOPBAR ── */

#topbar .logo{font-size:12.5px}
  #topbar .vbadge{display:none}
}

.tbar-link:hover{background:rgba(255,255,255,.12);color:#fff}
.tbar-link.here{background:rgba(255,255,255,.22);color:#fff;border-color:rgba(255,255,255,.4)}
.page{margin-top:var(--topbar-h);padding:20px 18px 60px;max-width:960px;margin-left:auto;margin-right:auto}
.controls{display:flex;flex-wrap:wrap;gap:10px;align-items:flex-start;margin-bottom:18px;padding:14px 16px;background:var(--white);border:1px solid var(--border);border-radius:12px}
.ctrl-group{display:flex;flex-direction:column;gap:5px}
.ctrl-label{font-size:9.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
.ctrl-pills{display:flex;gap:4px;flex-wrap:wrap}
.pill{font-size:11.5px;font-weight:500;padding:5px 12px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .12s;white-space:nowrap}
.pill:hover{border-color:var(--green-mid);color:var(--green-dark)}
.pill.sel-ph{background:var(--green-dark);color:#fff;border-color:var(--green-dark)}
.pill.sel-g{background:#edf7ec;color:#2d6a28;border-color:#8bc88a;font-weight:600}
.pill.sel-y{background:#fdf8e8;color:#8a6800;border-color:#e8c848;font-weight:600}
.pill.sel-r{background:#fdf0f0;color:#a03030;border-color:#e88080;font-weight:600}
.day-tab{font-size:12px;font-weight:500;padding:5px 15px;border-radius:20px;border:1px solid var(--border);background:var(--white);color:var(--text-mid);cursor:pointer;transition:all .12s}
.day-tab.active{background:var(--green-mid);color:#fff;border-color:var(--green-mid)}
.mode-banner{border-radius:10px;padding:10px 15px;margin-bottom:16px;font-size:13px;font-weight:500;display:flex;align-items:flex-start;gap:8px;line-height:1.5}
.mb-g{background:#edf7ec;border:1.5px solid #8bc88a;color:#2d6a28}
.mb-y{background:#fdf8e8;border:1.5px solid #e8c848;color:#8a6800}
.mb-r{background:#fdf0f0;border:1.5px solid #e88080;color:#a03030}
.grid{display:grid;grid-template-columns:1fr 330px;gap:14px;align-items:start}
@media(max-width:740px){.grid{grid-template-columns:1fr}}
.card{background:var(--white);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:14px}
.card-head{padding:9px 15px;border-bottom:1px solid var(--border-light);display:flex;align-items:center;justify-content:space-between}
.card-head h3{font-family:'DM Sans',sans-serif;font-size:10.5px;font-weight:600;letter-spacing:.1em;text-transform:uppercase}
.ch-green .card-head{background:var(--green-light);border-bottom-color:var(--green-border)}.ch-green .card-head h3{color:var(--green-dark)}
.ch-purple .card-head{background:var(--purple-light);border-bottom-color:var(--purple-border)}.ch-purple .card-head h3{color:var(--purple)}
.ch-blue .card-head{background:var(--blue-light);border-bottom-color:var(--blue-border)}.ch-blue .card-head h3{color:var(--blue-dark)}
.gr{display:flex;gap:10px;padding:7px 15px;border-bottom:1px solid var(--border-light);font-size:12.5px}
.gr:last-child{border-bottom:none}
.gl{color:var(--text-muted);min-width:108px;flex-shrink:0;font-size:11.5px}
.gv{color:var(--text-mid);flex:1;font-weight:500;line-height:1.4}
.sr{display:flex;gap:10px;padding:5px 15px;border-bottom:1px solid var(--border-light);font-size:12.5px;align-items:baseline}
.sr:last-child{border-bottom:none}
.st{color:var(--text-muted);font-size:10.5px;font-family:'DM Mono',monospace;white-space:nowrap;min-width:56px;flex-shrink:0}
.sa{color:var(--text-mid);flex:1;line-height:1.4}
.sa strong{color:var(--text)}
.tb-block{border-bottom:1px solid var(--border-light)}
.tb-block:last-child{border-bottom:none}
.tb-lbl{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);padding:7px 15px 3px;background:var(--border-light)}
.sup-r{display:flex;justify-content:space-between;align-items:baseline;padding:5px 15px;border-bottom:1px solid var(--border-light);font-size:12.5px;gap:8px}
.sup-r:last-child{border-bottom:none}
.sn{font-weight:500;color:var(--text);flex:1}
.sd{color:var(--text-muted);font-family:'DM Mono',monospace;font-size:10.5px;white-space:nowrap}
.pause-alert{background:var(--amber-light);border:1px solid var(--amber-border);border-radius:8px;padding:9px 13px;font-size:12.5px;color:#7a5010;margin-bottom:12px;line-height:1.5;display:none}
.pause-alert strong{color:#6a4000}
.lookup-body{padding:11px 15px}
#li{width:100%;padding:7px 11px;border:1px solid var(--border);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;color:var(--text);background:var(--cream);outline:none}
#li:focus{border-color:var(--green-mid);background:var(--white)}
#lr{margin-top:9px}
.li{padding:6px 9px;border-radius:6px;font-size:12.5px;color:var(--text-mid);cursor:pointer;margin-bottom:3px;transition:background .1s}
.li:hover{background:var(--green-light);color:var(--green-dark)}
.li .lk{font-weight:600;color:var(--text)}
.li .lv{color:var(--text-muted);font-size:11px;display:block;margin-top:1px}

#hamburger{display:none;background:none;border:none;color:#a8d4a0;font-size:22px;cursor:pointer;padding:4px 8px;margin-left:auto;flex-shrink:0;line-height:1}
#nav-drawer{display:none;position:fixed;top:var(--topbar-h);left:0;right:0;z-index:299;background:var(--green-dark);border-bottom:2px solid #1a3018;padding:10px 16px 14px;flex-direction:column;gap:6px}
#nav-drawer.open{display:flex}
#nav-drawer a{color:#c8e8c0;border:1px solid rgba(255,255,255,.18);font-family:'DM Sans',sans-serif;font-size:14px;font-weight:500;padding:11px 16px;border-radius:8px;text-decoration:none;text-align:center;transition:background .12s}
#nav-drawer a:hover,#nav-drawer a.active{background:rgba(255,255,255,.18);color:#fff}

/* ── MOBILE ── */
@media(max-width:700px){
  .sat-links{display:none}
  #hamburger{display:block}
  #topbar .logo{font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:calc(100vw - 88px)}
  #topbar .vbadge{display:none}
  #topbar{gap:8px;padding:0 14px}
}
@media(max-width:430px){
  #topbar .logo{font-size:12px;max-width:calc(100vw - 80px)}
  #topbar{padding:0 10px;gap:6px}
  #hamburger{font-size:20px;padding:2px 6px}
}
</style>
